name: test-publish

# 手動実行で TestPyPI にリリース。本番公開前のドライラン用。
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.13"
      - run: uv sync
      - run: uv run pytest

  build:
    name: build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.13"
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/holiday-jp-pip
    permissions:
      id-token: write   # Trusted Publishing (OIDC) に必要
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv publish --publish-url https://test.pypi.org/legacy/ --trusted-publishing always
